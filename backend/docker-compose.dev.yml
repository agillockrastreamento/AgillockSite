services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: agillock
      POSTGRES_USER: agillock_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5433:5432"  # host:5433 → container:5432 (evita conflito com outros projetos)
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agillock_user -d agillock"]
      interval: 3s
      timeout: 5s
      retries: 10

  traccar:
    image: traccar/traccar:latest
    container_name: traccar_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"   # Web UI + API — acessível em http://localhost:8082
      - "5023:5023"   # Protocolo GT06 (TCP) — dispositivos GPS apontam para este IP
    volumes:
      - ./traccar/traccar.dev.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_dev_logs:/opt/traccar/logs
    environment:
      - TZ=America/Sao_Paulo

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://agillock_user:dev_password@postgres:5432/agillock
      JWT_SECRET: dev_jwt_secret_troque_em_producao
      CORS_ORIGIN: http://localhost:5500,http://127.0.0.1:5500
      PORT: 3000
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_SENHA: ${ADMIN_SENHA}
      EFI_CLIENT_ID: ${EFI_CLIENT_ID:-}
      EFI_CLIENT_SECRET: ${EFI_CLIENT_SECRET:-}
      EFI_SANDBOX: "true"
      EFI_CERT_PATH: ./cert/certificado.p12
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      CLICKSIGN_ACCESS_TOKEN: ${CLICKSIGN_ACCESS_TOKEN:-}
      CLICKSIGN_WEBHOOK_SECRET: ${CLICKSIGN_WEBHOOK_SECRET:-}
      CLICKSIGN_BASE_URL: ${CLICKSIGN_BASE_URL:-https://sandbox.clicksign.com}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      # Traccar (rede interna Docker — backend acessa via nome do serviço)
      TRACCAR_URL: http://traccar:8082
      TRACCAR_USER: ${TRACCAR_USER:-admin@agillock.com.br}
      TRACCAR_PASSWORD: ${TRACCAR_PASSWORD:-AdminTraccar@dev}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh scripts/docker-entrypoint-dev.sh

volumes:
  postgres_dev_data:
  traccar_dev_logs:
