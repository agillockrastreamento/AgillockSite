services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: agillock
      POSTGRES_USER: agillock_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agillock_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agillock_user -d agillock"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agillock_user:${POSTGRES_PASSWORD}@postgres:5432/agillock
    volumes:
      - ./cert:/app/cert:ro
    ports:
      - "3000:3000"
    networks:
      - agillock_net

  traccar:
    image: traccar/traccar:latest
    container_name: traccar
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5023:5023"   # Protocolo GT06 — exposto publicamente para os dispositivos GPS
      # Porta 8082 NÃO exposta — backend acessa via rede interna Docker
    environment:
      - CONFIG_USE_ENVIRONMENT_VARIABLES=true
      - DATABASE_DRIVER=org.postgresql.Driver
      - DATABASE_URL=jdbc:postgresql://postgres:5432/traccar
      - DATABASE_USER=agillock_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - WEB_PORT=8082
      - GT06_PORT=5023
      - TIME_ZONE=America/Sao_Paulo
      - FILTER_ENABLE=true
      - FILTER_INVALID=true
      - FILTER_ZERO=true
      - FILTER_DUPLICATE=true
      - FILTER_FUTURE=600
      - DATABASE_POSITIONS_HISTORY_DAYS=365
    volumes:
      - traccar_logs:/opt/traccar/logs
    networks:
      - agillock_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - agillock_net

networks:
  agillock_net:

volumes:
  postgres_data:
  traccar_logs:
