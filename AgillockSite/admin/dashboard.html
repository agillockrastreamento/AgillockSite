<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if (localStorage.getItem('al-theme') === 'dark') document.documentElement.classList.add('dark-theme');</script>
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />
  <title>Dashboard — AgilLock Admin</title>
  <link rel="stylesheet" href="../css/bootstrap.min.css" />

<body>

  <!-- Sidebar -->
  <div class="admin-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="../img/logo_agillock_white_new.png" alt="AgilLock" style="height:36px;vertical-align:middle;"
        onerror="this.style.display='none'" />
    </div>
    <ul class="sidebar-nav">
      <li class="active"><a href="dashboard.html"><i class="fa fa-tachometer fa-fw"></i> Dashboard</a></li>
      <li><a href="clientes.html"><i class="fa fa-users fa-fw"></i> Clientes</a></li>
      <li><a href="dispositivos.html"><i class="fa fa-microchip fa-fw"></i> Dispositivos</a></li>
      <li><a href="gerar-cobranca.html"><i class="fa fa-file-text fa-fw"></i> Gerar Cobrança</a></li>
      <li><a href="cobrancas.html"><i class="fa fa-money fa-fw"></i> Cobranças</a></li>
      <li><a href="colaboradores.html"><i class="fa fa-user fa-fw"></i> Colaboradores</a></li>
      <li><a href="vendedores.html"><i class="fa fa-handshake-o fa-fw"></i> Vendedores</a></li>
      <li><a href="configuracoes.html"><i class="fa fa-cog fa-fw"></i> Configurações</a></li>

    <div class="sidebar-footer">

      <button id="btn-tema" class="btn-tema-sidebar"></button>
      <button id="btn-logout" class="btn-logout">
        <i class="fa fa-sign-out"></i> Sair
      </button>
    </div>
  </div>

  <!-- Overlay para mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Conteúdo principal -->
  <div class="admin-content">

    <!-- Topbar -->
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="sidebar-toggle" id="sidebar-toggle">
          <i class="fa fa-bars"></i>
        </button>
        <h2 class="topbar-title">Dashboard</h2>
      </div>
    </div>

    <!-- Alert container -->
    <div id="al-alert-container"></div>

    <!-- Cards de métricas -->
    <div class="row" id="metrics-row">
      <div class="col-sm-6 col-md-3">
        <div class="metric-card blue">
          <div class="value" id="m-clientes">—</div>
          <div class="label">Clientes Ativos</div>
        </div>
      </div>
      <div class="col-sm-6 col-md-3">
        <div class="metric-card green">
          <div class="value" id="m-placas">—</div>
          <div class="label">Dispositivos Ativos</div>
        </div>
      </div>
      <div class="col-sm-6 col-md-3">
        <div class="metric-card yellow">
          <div class="value" id="m-recebimentos">—</div>
          <div class="label">Recebimentos Hoje</div>
        </div>
      </div>
      <div class="col-sm-6 col-md-3">
        <div class="metric-card red">
          <div class="value" id="m-atrasados">—</div>
          <div class="label">Boletos em Atraso</div>
        </div>
      </div>
    </div>

    <div style="margin-top:24px;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-success" id="btn-importar-planilha" data-toggle="modal" data-target="#modal-importar-planilha">
        <i class="fa fa-upload"></i> Importar Planilha
      </button>
      <button class="btn btn-default" id="btn-refresh">
        <i class="fa fa-refresh"></i> Atualizar dados
      </button>
    </div>

    <!-- Modal: Importar via Planilha -->
    <div class="modal fade" id="modal-importar-planilha" tabindex="-1" role="dialog">
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Fechar"><span
                aria-hidden="true">&times;</span></button>
            <h4 class="modal-title"><i class="fa fa-upload"></i> Importar Clientes via Planilha</h4>
          </div>
          <div class="modal-body" id="modal-pl-body">
            <!-- conteúdo dinâmico via JS -->
          </div>
          <div class="modal-footer" id="modal-pl-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /admin-content -->

  <script src="../js/jquery.js"></script>
  <script src="../js/bootstrap.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script>
    (function () {
      var user = AL.requireAuth(['ADMIN']);
      if (!user) return;

      // Exibe usuário
      document.getElementById('user-nome').textContent = user.nome || user.email || '—';
      var badge = document.getElementById('user-badge');
      badge.textContent = user.role;
      badge.className = 'al-badge ' + (user.role === 'ADMIN' ? 'badge-ativo' : 'badge-pendente');

      // Sidebar toggle (mobile)
      document.getElementById('sidebar-toggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('open');
      });
      document.getElementById('sidebar-overlay').addEventListener('click', function () {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('open');
      });

      // Logout
      document.getElementById('btn-logout').addEventListener('click', AL.logout);
      AL.initThemeToggle('btn-tema');

      // Carrega métricas
      function loadDashboard() {
        document.getElementById('m-clientes').textContent = '…';
        document.getElementById('m-placas').textContent = '…';
        document.getElementById('m-recebimentos').textContent = '…';
        document.getElementById('m-atrasados').textContent = '…';

        AL.apiGet('/api/dashboard')
          .then(function (data) {
            document.getElementById('m-clientes').textContent = data.totalClientesAtivos !== undefined ? data.totalClientesAtivos : '—';
            document.getElementById('m-placas').textContent = data.totalDispositivosAtivos !== undefined ? data.totalDispositivosAtivos : '—';
            document.getElementById('m-recebimentos').textContent = data.recebimentosHoje !== undefined
              ? AL.fmtMoney(data.recebimentosHoje) : '—';
            document.getElementById('m-atrasados').textContent = data.totalAtrasados !== undefined ? data.totalAtrasados : '—';
          })
          .catch(function (err) {
            AL.showAlert('Erro ao carregar dashboard: ' + err.message);
          });
      }

      loadDashboard();
      document.getElementById('btn-refresh').addEventListener('click', loadDashboard);

      // ── Importar via Planilha ───────────────────────────────────────────────
      var planilhaArquivo = null;
      var planilhaDados = null;
      var planilhaColunas = [];

      function plSetBody(html) {
        document.getElementById('modal-pl-body').innerHTML = html;
      }
      function plSetFooter(html) {
        document.getElementById('modal-pl-footer').innerHTML = html;
      }

      // Cores adaptadas ao tema (claro/escuro)
      function plCores() {
        var dark = document.documentElement.classList.contains('dark-theme');
        return {
          text:       dark ? '#d0d0d0' : '#555',
          muted:      dark ? '#999'    : '#666',
          infoBg:     dark ? '#1a2d3a' : '#f0f7ff',
          infoBorder: dark ? '#2a4d60' : '#c8e0f9',
          infoTitle:  dark ? '#7dbdd6' : '#31708f',
          infoText:   dark ? '#b8cfd8' : '#555',
          errText:    dark ? '#e8a0a0' : '#a94442',
          sepBg:      dark ? '#1e2a35' : '#f0f0f0',
          sepText:    dark ? '#aaa'    : '#666',
          noteText:   dark ? '#888'    : '#999',
        };
      }

      // Tenta extrair campos de endereço a partir de uma string completa
      function plParsearEndereco(texto) {
        if (!texto || !texto.trim()) return {};
        var r = {}, s = texto.trim();

        // CEP: 00000-000 ou 00000000
        var cepM = s.match(/\b(\d{5}-?\d{3})\b/);
        if (cepM) {
          r.cep = cepM[1];
          s = s.replace(cepM[0], '').replace(/\bCEP[:\s]*/i, '').trim();
        }

        // Estado: sigla UF de 2 letras
        var ufM = s.match(/\b(AC|AL|AP|AM|BA|CE|DF|ES|GO|MA|MT|MS|MG|PA|PB|PR|PE|PI|RJ|RN|RS|RO|RR|SC|SP|SE|TO)\b/i);
        if (ufM) {
          r.estado = ufM[1].toUpperCase();
          s = s.replace(new RegExp('\\b' + ufM[1] + '\\b', 'i'), '').trim();
        }

        // Separa por vírgula, traço duplo, barra ou pipe
        var partes = s.split(/,|--|\|/).map(function (p) { return p.trim(); }).filter(Boolean);
        if (partes.length === 0) return r;

        // Primeiro segmento = logradouro (com possível número embutido no final)
        var primeiro = partes[0];
        var numEmbutido = primeiro.match(/\s+(\d+[A-Za-z]?)\s*$/);
        if (numEmbutido) {
          r.logradouro = primeiro.replace(numEmbutido[0], '').trim();
          r.numero = numEmbutido[1];
        } else {
          r.logradouro = primeiro;
        }

        // Segmentos restantes → número, bairro, cidade
        var resto = partes.slice(1);
        for (var i = 0; i < resto.length; i++) {
          var p = resto[i];
          if (!r.numero && /^\d/.test(p)) { r.numero = p; }
          else if (!r.bairro && i < 2)   { r.bairro = p; }
          else if (!r.cidade)             { r.cidade = p; }
        }

        return r;
      }

      // Step 1 — Upload
      function plEstadoUpload() {
        planilhaArquivo = null;
        planilhaDados = null;
        planilhaColunas = [];

        var c = plCores();
        var html = '';
        html += '<div style="background:' + c.infoBg + ';border:1px solid ' + c.infoBorder + ';border-radius:6px;padding:16px;margin-bottom:20px;">';
        html += '<p style="margin:0 0 8px;font-weight:600;color:' + c.infoTitle + ';"><i class="fa fa-info-circle"></i> Como preparar sua planilha</p>';
        html += '<ul style="margin:0;padding-left:20px;color:' + c.infoText + ';font-size:13px;line-height:1.7;">';
        html += '<li>A planilha deve ter uma <strong>linha de cabeçalho</strong> com os nomes das colunas</li>';
        html += '<li>Colunas reconhecidas: <strong>Nome</strong> <span style="color:' + c.errText + '">(obrigatório)</span>, <strong>Placa(s)</strong>, <strong>CPF/CNPJ</strong>, <strong>E-mail</strong>, <strong>Telefone</strong></li>';
        html += '<li>Endereço: pode ser uma <strong>coluna única</strong> (ex: "Endereço") ou <strong>colunas separadas</strong> (CEP, Logradouro, Número, Bairro, Cidade, Estado)</li>';
        html += '<li>Múltiplas placas: separe com <strong>+</strong> &nbsp;&nbsp;exemplo: <code>ABC1D23 + XYZ4E56 + DEF5G78</code></li>';
        html += '<li>Formatos aceitos: <strong>.xlsx</strong>, <strong>.xls</strong> ou <strong>.csv</strong></li>';
        html += '</ul>';
        html += '</div>';

        html += '<div id="pl-dropzone" style="border:2px dashed #ccc;border-radius:8px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;">';
        html += '<i class="fa fa-cloud-upload fa-3x" style="color:#aaa;margin-bottom:14px;display:block;"></i>';
        html += '<p style="font-size:15px;color:#666;margin:0 0 6px;">Arraste seu arquivo aqui</p>';
        html += '<p style="font-size:13px;color:#aaa;margin:0 0 18px;">ou</p>';
        html += '<label class="btn btn-primary" style="cursor:pointer;margin:0;">';
        html += '<i class="fa fa-folder-open"></i> Selecionar arquivo';
        html += '<input type="file" id="pl-file-input" accept=".xlsx,.xls,.csv" style="display:none;">';
        html += '</label>';
        html += '<p style="font-size:12px;color:#bbb;margin:12px 0 0;">XLSX, XLS ou CSV</p>';
        html += '</div>';

        plSetBody(html);
        plSetFooter('<button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>');

        // Drag-and-drop listeners
        var dropzone = document.getElementById('pl-dropzone');
        var fileInput = document.getElementById('pl-file-input');

        dropzone.addEventListener('dragover', function (e) {
          e.preventDefault();
          dropzone.style.borderColor = '#337ab7';
          dropzone.style.background = '#f0f7ff';
        });
        dropzone.addEventListener('dragleave', function () {
          dropzone.style.borderColor = '#ccc';
          dropzone.style.background = '';
        });
        dropzone.addEventListener('drop', function (e) {
          e.preventDefault();
          dropzone.style.borderColor = '#ccc';
          dropzone.style.background = '';
          if (e.dataTransfer.files.length > 0) plHandleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', function () {
          if (this.files.length > 0) plHandleFile(this.files[0]);
        });
      }

      // Lê e processa o arquivo selecionado
      function plHandleFile(file) {
        if (!file) return;
        planilhaArquivo = file;

        plSetBody(
          '<div style="text-align:center;padding:40px 20px;">' +
          '<i class="fa fa-spinner fa-spin fa-3x" style="color:#337ab7;"></i>' +
          '<p style="margin-top:16px;color:#666;">Lendo arquivo...</p>' +
          '</div>'
        );
        plSetFooter('<button type="button" class="btn btn-default" disabled>Aguarde...</button>');

        var ext = file.name.split('.').pop().toLowerCase();
        var reader = new FileReader();

        if (ext === 'csv') {
          reader.onload = function (e) {
            try {
              var rows = plParseCSV(e.target.result);
              plProcessarLinhas(rows);
            } catch (err) {
              plMostrarErroArquivo(err.message);
            }
          };
          reader.readAsText(file, 'UTF-8');
        } else {
          // XLSX / XLS via SheetJS
          reader.onload = function (e) {
            try {
              var data = new Uint8Array(e.target.result);
              var workbook = XLSX.read(data, { type: 'array' });
              var sheet = workbook.Sheets[workbook.SheetNames[0]];
              var rows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
              plProcessarLinhas(rows);
            } catch (err) {
              plMostrarErroArquivo(err.message);
            }
          };
          reader.readAsArrayBuffer(file);
        }
      }

      function plMostrarErroArquivo(msg) {
        plSetBody('<div class="alert alert-danger"><strong>Erro ao ler arquivo:</strong> ' + msg + '</div>');
        plSetFooter(
          '<button type="button" class="btn btn-default" id="btn-pl-voltar-upload">&#8592; Tentar novamente</button>' +
          '<button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>'
        );
        document.getElementById('btn-pl-voltar-upload').addEventListener('click', plEstadoUpload);
      }

      // Parser CSV simples (suporta campos com aspas e separadores , ou ;)
      function plParseCSV(text) {
        var lines = text.split(/\r?\n/).filter(function (l) { return l.trim(); });
        if (lines.length < 2) return [];

        function parseLine(line) {
          var result = [], cur = '', inQuote = false;
          for (var i = 0; i < line.length; i++) {
            var c = line[i];
            if (c === '"' && !inQuote) { inQuote = true; }
            else if (c === '"' && inQuote) { inQuote = false; }
            else if ((c === ',' || c === ';') && !inQuote) { result.push(cur.trim()); cur = ''; }
            else { cur += c; }
          }
          result.push(cur.trim());
          return result;
        }

        var headers = parseLine(lines[0]);
        return lines.slice(1).map(function (line) {
          var vals = parseLine(line);
          var obj = {};
          headers.forEach(function (h, i) { obj[h] = vals[i] || ''; });
          return obj;
        });
      }

      function plProcessarLinhas(rows) {
        if (!rows || rows.length === 0) {
          plSetBody('<div class="alert alert-warning">Planilha vazia ou sem dados válidos.</div>');
          plSetFooter(
            '<button type="button" class="btn btn-default" id="btn-pl-voltar-upload">&#8592; Voltar</button>' +
            '<button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>'
          );
          document.getElementById('btn-pl-voltar-upload').addEventListener('click', plEstadoUpload);
          return;
        }
        planilhaDados = rows;
        planilhaColunas = Object.keys(rows[0]);
        plEstadoMapeamento();
      }

      // Auto-detecta colunas por nomes comuns
      function plDetectarColunas(headers) {
        var result = {
          nome: '', placa: '', cpfCnpj: '', email: '', telefone: '',
          endCompleto: '', cep: '', logradouro: '', numero: '',
          complemento: '', bairro: '', cidade: '', estado: '',
        };
        var lh = headers.map(function (h) { return (h || '').toLowerCase().trim(); });
        var maps = {
          nome:        ['nome', 'cliente', 'name', 'razão social', 'razao social'],
          placa:       ['placa', 'placas', 'placa(s)', 'veículo', 'veiculo', 'placa/veículo'],
          cpfCnpj:     ['cpf/cnpj', 'cpf', 'cnpj', 'documento', 'doc', 'cpf_cnpj'],
          email:       ['email', 'e-mail', 'e_mail', 'correio'],
          telefone:    ['telefone', 'fone', 'celular', 'phone', 'tel', 'whatsapp'],
          endCompleto: ['endereço', 'endereco', 'address', 'endereço completo', 'endereco completo', 'end completo', 'end'],
          cep:         ['cep', 'zip', 'cep/zip', 'código postal', 'codigo postal'],
          logradouro:  ['logradouro', 'rua', 'avenida', 'street', 'logr'],
          numero:      ['número', 'numero', 'nº', 'num', 'n°', 'number'],
          complemento: ['complemento', 'comp', 'apto', 'apartamento'],
          bairro:      ['bairro', 'district'],
          cidade:      ['cidade', 'city', 'municipio', 'município'],
          estado:      ['estado', 'uf', 'state', 'sigla estado', 'sigla uf'],
        };
        Object.keys(maps).forEach(function (campo) {
          maps[campo].forEach(function (k) {
            if (!result[campo]) {
              var i = lh.indexOf(k);
              if (i >= 0) result[campo] = headers[i];
            }
          });
        });
        return result;
      }

      // Step 2 — Mapeamento de colunas + preview
      function plEstadoMapeamento() {
        var mapa = plDetectarColunas(planilhaColunas);
        var total = planilhaDados.length;
        var c = plCores();
        var html = '';

        // Cabeçalho com nome do arquivo
        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">';
        html += '<i class="fa fa-file-excel-o" style="color:#217346;font-size:20px;"></i>';
        html += '<span style="font-weight:600;">' + (planilhaArquivo ? planilhaArquivo.name : 'arquivo') + '</span>';
        html += '&nbsp;<span class="label label-info">' + total + ' linha(s) encontrada(s)</span>';
        html += '</div>';

        html += '<p style="font-size:13px;color:' + c.text + ';margin-bottom:8px;"><strong>Mapeamento de colunas</strong> — confira qual coluna corresponde a cada campo:</p>';
        html += '<div style="max-height:280px;overflow-y:auto;margin-bottom:18px;">';
        html += '<table class="table table-condensed" style="font-size:13px;margin:0;">';
        html += '<thead><tr><th style="width:200px;">Campo do sistema</th><th>Coluna da planilha</th><th style="width:90px;">Obrigatório</th></tr></thead><tbody>';

        function plSelectColunas(id, val) {
          var s = '<select class="form-control input-sm" id="' + id + '">';
          s += '<option value="">(não importar)</option>';
          planilhaColunas.forEach(function (col) {
            s += '<option value="' + col + '"' + (val === col ? ' selected' : '') + '>' + col + '</option>';
          });
          s += '</select>';
          return s;
        }

        var campos = [
          { id: 'pl-map-nome',     label: 'Nome do cliente', val: mapa.nome,     obrig: true  },
          { id: 'pl-map-placa',    label: 'Placa(s)',        val: mapa.placa,    obrig: false },
          { id: 'pl-map-cpfcnpj',  label: 'CPF / CNPJ',     val: mapa.cpfCnpj,  obrig: false },
          { id: 'pl-map-email',    label: 'E-mail',          val: mapa.email,    obrig: false },
          { id: 'pl-map-telefone', label: 'Telefone',        val: mapa.telefone, obrig: false },
        ];
        campos.forEach(function (f) {
          html += '<tr><td><strong>' + f.label + '</strong></td><td>' + plSelectColunas(f.id, f.val) + '</td><td>';
          html += f.obrig ? '<span class="label label-danger">Sim</span>' : '<span class="label label-default">Não</span>';
          html += '</td></tr>';
        });

        // Separador de endereço
        html += '<tr><td colspan="3" style="background:' + c.sepBg + ';padding:6px 10px;font-size:11px;color:' + c.sepText + ';font-weight:700;text-transform:uppercase;letter-spacing:.5px;">Endereço — coluna única <em>ou</em> campos individuais</td></tr>';

        var camposEnd = [
          { id: 'pl-map-end-completo', label: 'Endereço completo', val: mapa.endCompleto, note: 'Se preenchido sem campos individuais, extraímos automaticamente CEP, logradouro, número, bairro, cidade e estado' },
          { id: 'pl-map-cep',          label: '↳ CEP',             val: mapa.cep         },
          { id: 'pl-map-logradouro',   label: '↳ Logradouro',      val: mapa.logradouro  },
          { id: 'pl-map-numero',       label: '↳ Número',          val: mapa.numero      },
          { id: 'pl-map-complemento',  label: '↳ Complemento',     val: mapa.complemento },
          { id: 'pl-map-bairro',       label: '↳ Bairro',          val: mapa.bairro      },
          { id: 'pl-map-cidade',       label: '↳ Cidade',          val: mapa.cidade      },
          { id: 'pl-map-estado',       label: '↳ Estado (UF)',     val: mapa.estado      },
        ];
        camposEnd.forEach(function (f) {
          html += '<tr><td><strong>' + f.label + '</strong>';
          if (f.note) html += '<br><small style="font-weight:normal;color:' + c.noteText + ';">' + f.note + '</small>';
          html += '</td><td>' + plSelectColunas(f.id, f.val) + '</td><td><span class="label label-default">Não</span></td></tr>';
        });

        html += '</tbody></table></div>';

        // Prévia dos dados
        var previewRows = planilhaDados.slice(0, 5);
        html += '<p style="font-size:13px;color:' + c.text + ';margin-bottom:6px;"><strong>Prévia</strong> (primeiras ' + previewRows.length + ' de ' + total + ' linhas):</p>';
        html += '<div style="overflow-x:auto;max-height:160px;overflow-y:auto;">';
        html += '<table class="table table-condensed table-bordered table-striped" style="font-size:12px;margin:0;">';
        html += '<thead><tr>';
        planilhaColunas.forEach(function (col) { html += '<th style="white-space:nowrap;">' + col + '</th>'; });
        html += '</tr></thead><tbody>';
        previewRows.forEach(function (row) {
          html += '<tr>';
          planilhaColunas.forEach(function (col) { html += '<td style="white-space:nowrap;">' + (row[col] || '') + '</td>'; });
          html += '</tr>';
        });
        html += '</tbody></table></div>';

        plSetBody(html);
        plSetFooter(
          '<button type="button" class="btn btn-default" id="btn-pl-voltar">&#8592; Voltar</button>' +
          '<button type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>' +
          '<button type="button" class="btn btn-primary" id="btn-pl-confirmar">' +
          '<i class="fa fa-upload"></i> Importar ' + total + ' cliente(s)</button>'
        );

        document.getElementById('btn-pl-voltar').addEventListener('click', plEstadoUpload);
        document.getElementById('btn-pl-confirmar').addEventListener('click', plExecutarImportacao);
      }

      // Extrai placas de um texto usando regex + separador +
      function plExtrairPlacas(texto) {
        if (!texto) return [];
        return texto.split('+').map(function (parte) {
          var s = parte.trim().toUpperCase();
          // Mercosul: ABC1D23
          var m1 = s.match(/[A-Z]{3}[0-9][A-Z][0-9]{2}/);
          // Antigo: ABC1234
          var m2 = s.match(/[A-Z]{3}[0-9]{4}/);
          if (m1) return m1[0];
          if (m2) return m2[0];
          // Fallback: remove tudo que não é alfanumérico
          var limpa = s.replace(/[^A-Z0-9]/g, '');
          return limpa.length >= 7 ? limpa : '';
        }).filter(function (p) { return p; });
      }

      // Envia dados para o backend
      function plExecutarImportacao() {
        var colNome        = document.getElementById('pl-map-nome').value;
        var colPlaca       = document.getElementById('pl-map-placa').value;
        var colCpfCnpj     = document.getElementById('pl-map-cpfcnpj').value;
        var colEmail       = document.getElementById('pl-map-email').value;
        var colTelefone    = document.getElementById('pl-map-telefone').value;
        var colEndCompleto = document.getElementById('pl-map-end-completo').value;
        var colCep         = document.getElementById('pl-map-cep').value;
        var colLogradouro  = document.getElementById('pl-map-logradouro').value;
        var colNumero      = document.getElementById('pl-map-numero').value;
        var colComplemento = document.getElementById('pl-map-complemento').value;
        var colBairro      = document.getElementById('pl-map-bairro').value;
        var colCidade      = document.getElementById('pl-map-cidade').value;
        var colEstado      = document.getElementById('pl-map-estado').value;

        if (!colNome) {
          alert('Selecione a coluna para "Nome do cliente".');
          return;
        }

        var clientes = planilhaDados
          .map(function (row) {
            // Parseia endereço completo (usado só quando campo individual não mapeado)
            var parsed = colEndCompleto ? plParsearEndereco(row[colEndCompleto] || '') : {};
            function end(col, key) { return (col ? (row[col] || '').trim() : '') || parsed[key] || ''; }

            return {
              nome:        (row[colNome] || '').trim(),
              placas:      plExtrairPlacas(colPlaca ? row[colPlaca] : ''),
              cpfCnpj:     colCpfCnpj  ? (row[colCpfCnpj]  || '').trim() : '',
              email:       colEmail    ? (row[colEmail]    || '').trim() : '',
              telefone:    colTelefone ? (row[colTelefone] || '').trim() : '',
              cep:         end(colCep,        'cep'),
              logradouro:  end(colLogradouro, 'logradouro'),
              numero:      end(colNumero,     'numero'),
              complemento: colComplemento ? (row[colComplemento] || '').trim() : '',
              bairro:      end(colBairro,     'bairro'),
              cidade:      end(colCidade,     'cidade'),
              estado:      end(colEstado,     'estado'),
            };
          })
          .filter(function (c) { return c.nome; });

        if (clientes.length === 0) {
          alert('Nenhum cliente válido encontrado (coluna Nome vazia em todas as linhas).');
          return;
        }

        plSetBody(
          '<div style="text-align:center;padding:40px 20px;">' +
          '<i class="fa fa-spinner fa-spin fa-3x" style="color:#337ab7;"></i>' +
          '<p style="margin-top:16px;color:#666;">Importando ' + clientes.length + ' cliente(s)...<br>' +
          '<small>Aguarde, isso pode levar alguns segundos.</small></p>' +
          '</div>'
        );
        plSetFooter('<button type="button" class="btn btn-default" disabled>Aguarde...</button>');

        AL.apiPost('/api/admin/importar-planilha', { clientes: clientes })
          .then(function (res) { plEstadoResultado(res); })
          .catch(function (err) {
            plSetBody('<div class="alert alert-danger">Erro na importação: ' + err.message + '</div>');
            plSetFooter('<button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>');
          });
      }

      // Step 3 — Resultado
      function plEstadoResultado(res) {
        var temErros = res.erros && res.erros.length > 0;
        var html = '';

        html += '<div style="text-align:center;padding:20px 0 16px;">';
        if (!temErros) {
          html += '<i class="fa fa-check-circle fa-3x" style="color:#5cb85c;"></i>';
          html += '<p style="margin-top:12px;font-size:16px;font-weight:600;color:#3d8b3d;">Importação concluída!</p>';
        } else {
          html += '<i class="fa fa-exclamation-circle fa-3x" style="color:#f0ad4e;"></i>';
          html += '<p style="margin-top:12px;font-size:16px;font-weight:600;color:#8a6d3b;">Importação concluída com avisos</p>';
        }
        html += '</div>';

        html += '<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;">';
        html += '<div style="min-width:120px;background:#dff0d8;border-radius:6px;padding:14px 16px;text-align:center;">' +
          '<div style="font-size:26px;font-weight:700;color:#3c763d;">' + res.importados + '</div>' +
          '<div style="font-size:12px;color:#3c763d;margin-top:2px;">Clientes criados</div></div>';
        html += '<div style="min-width:120px;background:#d9edf7;border-radius:6px;padding:14px 16px;text-align:center;">' +
          '<div style="font-size:26px;font-weight:700;color:#31708f;">' + (res.placasCriadas || 0) + '</div>' +
          '<div style="font-size:12px;color:#31708f;margin-top:2px;">Placas criadas</div></div>';
        if (temErros) {
          html += '<div style="min-width:120px;background:#fcf8e3;border-radius:6px;padding:14px 16px;text-align:center;">' +
            '<div style="font-size:26px;font-weight:700;color:#8a6d3b;">' + res.erros.length + '</div>' +
            '<div style="font-size:12px;color:#8a6d3b;margin-top:2px;">Erros</div></div>';
        }
        html += '</div>';

        if (temErros) {
          html += '<p style="font-size:13px;color:#8a6d3b;margin-bottom:6px;"><strong>Detalhes dos erros:</strong></p>';
          html += '<ul style="font-size:12px;color:#a94442;max-height:120px;overflow-y:auto;background:#fdf2f2;padding:10px 10px 10px 28px;border-radius:4px;">';
          res.erros.forEach(function (e) {
            html += '<li>Linha ' + e.linha + ' (' + e.nome + '): ' + e.erro + '</li>';
          });
          html += '</ul>';
        }

        plSetBody(html);
        plSetFooter(
          '<button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>' +
          '<button type="button" class="btn btn-primary" id="btn-pl-atualizar">' +
          '<i class="fa fa-refresh"></i> Atualizar dashboard</button>'
        );
        document.getElementById('btn-pl-atualizar').addEventListener('click', function () {
          $('#modal-importar-planilha').modal('hide');
          loadDashboard();
        });
      }

      // Inicializa o wizard ao abrir o modal
      $('#modal-importar-planilha').on('show.bs.modal', function () {
        plEstadoUpload();
      });
      // Limpa ao fechar
      $('#modal-importar-planilha').on('hidden.bs.modal', function () {
        planilhaArquivo = null;
        planilhaDados = null;
        planilhaColunas = [];
        plSetBody('');
        plSetFooter('<button type="button" class="btn btn-default" data-dismiss="modal">Fechar</button>');
      });
    })();
  </script>
</body>

</html>
