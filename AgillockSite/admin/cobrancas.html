<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(localStorage.getItem('al-theme')==='dark')document.documentElement.classList.add('dark-theme');</script>
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />
  <title>Cobranças — AgilLock Admin</title>
  <link rel="stylesheet" href="../css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />

  <style>
    body { overflow: hidden !important; height: 100vh; }
    .admin-content { height: 100vh; display: flex; flex-direction: column; padding-bottom: 24px !important; }
    #al-alert-container, .filter-bar { flex-shrink: 0; }
    .table-responsive {
      flex: 1;
      overflow-y: auto;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      margin-bottom: 0;
    }
    html.dark-theme .table-responsive { background: #141820; }
    .admin-table thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 2px -1px rgba(0,0,0,0.1);
    }
    .boleto-actions { display: flex; gap: 4px; flex-wrap: nowrap; justify-content: flex-end; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="admin-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="../img/logo_agillock_white_new.png" alt="AgilLock" style="height:36px;vertical-align:middle;" onerror="this.style.display='none'" />
    </div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><i class="fa fa-tachometer fa-fw"></i> Dashboard</a></li>
      <li><a href="clientes.html"><i class="fa fa-users fa-fw"></i> Clientes</a></li>
      <li><a href="gerar-cobranca.html"><i class="fa fa-file-text fa-fw"></i> Gerar Cobrança</a></li>
      <li class="active"><a href="cobrancas.html"><i class="fa fa-money fa-fw"></i> Cobranças</a></li>
      <li><a href="colaboradores.html"><i class="fa fa-user fa-fw"></i> Colaboradores</a></li>
      <li><a href="vendedores.html"><i class="fa fa-handshake-o fa-fw"></i> Vendedores</a></li>
      <li><a href="configuracoes.html"><i class="fa fa-cog fa-fw"></i> Configurações</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <span id="user-nome" class="sidebar-user-nome">—</span>
        <span id="user-badge" class="al-badge" style="margin-top:4px;"></span>
      </div>
      <button id="btn-tema" class="btn-tema-sidebar"></button>
      <button id="btn-logout" class="btn-logout"><i class="fa fa-sign-out"></i> Sair</button>
    </div>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Conteúdo principal -->
  <div class="admin-content">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa fa-bars"></i></button>
        <h2 class="topbar-title">Cobranças</h2>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <a href="gerar-cobranca.html" class="btn btn-primary-al"><i class="fa fa-plus"></i> Nova Cobrança</a>
      </div>
    </div>

    <div id="al-alert-container"></div>

    <!-- Filtros -->
    <div class="filter-bar">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <input type="text" id="filtro-busca" class="form-control" style="flex:2;min-width:180px;max-width:280px;" placeholder="Buscar por nome, CPF/CNPJ ou carnê…" />
        <select id="filtro-status" class="form-control" style="width:auto;">
          <option value="">Todos os status</option>
          <option value="hoje">Hoje</option>
          <option value="aberto">Em aberto</option>
          <option value="ATRASADO">Atrasado</option>
          <option value="PAGO">Pago</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
        <select id="filtro-tipo" class="form-control" style="width:auto;">
          <option value="">Todos os tipos</option>
          <option value="INDIVIDUAL">Individual</option>
          <option value="UNIFICADO">Unificado</option>
        </select>
        <span style="font-size:12px;color:#888;white-space:nowrap;">Venc. de</span>
        <input type="date" id="filtro-data-de" class="form-control" style="width:auto;" />
        <span style="font-size:12px;color:#888;">até</span>
        <input type="date" id="filtro-data-ate" class="form-control" style="width:auto;" />
        <button class="btn btn-default btn-sm" id="btn-limpar">Limpar</button>
      </div>
      <div style="margin-top:6px;min-height:18px;">
        <span id="total-badge" style="display:none;font-size:12px;color:#888;"></span>
      </div>
    </div>

    <!-- Tabela -->
    <div class="table-responsive">
      <table class="table admin-table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Parcela</th>
            <th>Placas</th>
            <th>Vencimento</th>
            <th>Pagamento</th>
            <th>Valor</th>
            <th>Status</th>
            <th style="text-align:right;">Ações</th>
          </tr>
        </thead>
        <tbody id="boletos-tbody">
          <tr><td colspan="8" class="text-center text-muted">Carregando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal alterar vencimento -->
  <div class="modal fade" id="modal-editar-boleto" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" style="color:white;">&times;</button>
          <h4 class="modal-title">Alterar Vencimento</h4>
        </div>
        <div class="modal-body">
          <div id="modal-edit-alert"></div>
          <input type="hidden" id="edit-boleto-id" />
          <div class="form-group">
            <label>Nova data de vencimento</label>
            <input type="date" class="form-control" id="edit-data" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary-al" id="btn-salvar-edit">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/jquery.js"></script>
  <script src="../js/bootstrap.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script>
  (function () {
    var currentUser = AL.requireAuth(['ADMIN', 'COLABORADOR']);
    if (!currentUser) return;

    var isAdmin = currentUser.role === 'ADMIN';
    var podeBaixa = isAdmin || currentUser.podeBaixaManual;
    var podeEditarVenc = isAdmin || currentUser.podeAlterarVencimento;

    document.getElementById('user-nome').textContent = currentUser.nome || '—';
    var ub = document.getElementById('user-badge');
    ub.textContent = currentUser.role;
    ub.className = 'al-badge ' + (isAdmin ? 'badge-ativo' : 'badge-pendente');
    document.getElementById('sidebar-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function () {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
    });
    document.getElementById('btn-logout').addEventListener('click', AL.logout);
    AL.initThemeToggle('btn-tema');

    var filtros = { busca: '', status: '', tipo: '', dataDe: '', dataAte: '' };
    var debounceTimer = null;

    function buildQuery() {
      var p = [];
      if (filtros.busca) p.push('busca=' + encodeURIComponent(filtros.busca));
      if (filtros.status) p.push('status=' + encodeURIComponent(filtros.status));
      if (filtros.tipo) p.push('tipo=' + encodeURIComponent(filtros.tipo));
      if (filtros.dataDe) p.push('dataVencDe=' + filtros.dataDe);
      if (filtros.dataAte) p.push('dataVencAte=' + filtros.dataAte);
      return p.length ? '?' + p.join('&') : '';
    }

    function carregarBoletos() {
      var tbody = document.getElementById('boletos-tbody');
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted"><i class="fa fa-spinner fa-spin"></i> Carregando…</td></tr>';
      AL.apiGet('/api/boletos' + buildQuery())
        .then(renderBoletos)
        .catch(function (err) {
          tbody.innerHTML = '<tr><td colspan="8" class="text-danger text-center">' + esc(err.message) + '</td></tr>';
        });
    }

    function renderBoletos(boletos) {
      var tbody = document.getElementById('boletos-tbody');
      var badge = document.getElementById('total-badge');

      if (!boletos || !boletos.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:40px;">Nenhuma cobrança encontrada.</td></tr>';
        badge.style.display = 'none';
        return;
      }

      badge.textContent = boletos.length + (boletos.length >= 500 ? '+' : '') + ' resultado(s)';
      badge.style.display = '';

      tbody.innerHTML = boletos.map(function (b) {
        var cliente = b.carne ? b.carne.cliente : null;
        var clienteNome = cliente ? esc(cliente.nome) : '—';
        var clienteCell = cliente
          ? '<a href="cliente-detalhe.html?id=' + cliente.id + '">' + clienteNome + '</a>' +
            (cliente.cpfCnpj ? '<br><small class="text-muted">' + AL.fmtCpfCnpj(cliente.cpfCnpj) + '</small>' : '')
          : '—';

        var total = b.carne ? b.carne.numeroParcelas : '?';
        var tipoBadge = b.carne && b.carne.tipo === 'UNIFICADO'
          ? '<span class="al-badge badge-pendente" style="font-size:10px;">UNIFICADO</span>'
          : '<span class="al-badge badge-ativo" style="font-size:10px;">INDIVIDUAL</span>';
        var parcelaCell = 'Parc. ' + (b.numeroParcela || '—') + ' / ' + total + '<br>' + tipoBadge;

        var placasCell;
        if (b.carne && b.carne.tipo === 'UNIFICADO') {
          var pList = (b.placasUnificadas || []).map(function (bp) {
            return bp.placa ? esc(bp.placa.placa) : '';
          }).filter(Boolean);
          placasCell = pList.length
            ? '<span title="' + pList.join(', ') + '"><i class="fa fa-compress"></i> Unificado <small class="text-muted">(' + pList.length + ' placas)</small></span>'
            : '<i class="fa fa-compress"></i> Unificado';
        } else {
          placasCell = b.placa ? '<span class="al-badge badge-ativo">' + esc(b.placa.placa) + '</span>' : '—';
        }

        var isHoje = AL.isHoje(b.vencimento) && (b.status === 'PENDENTE' || b.status === 'ATRASADO');
        var statusCell = isHoje
          ? '<span class="al-badge" style="background:#17a2b8;color:#fff;">Dia do pagamento</span>'
          : AL.badgeStatus(b.status);

        var acoes = '';
        if (b.linkBoleto) {
          acoes += '<a href="' + b.linkBoleto + '" target="_blank" class="btn btn-xs btn-info" title="Ver PDF"><i class="fa fa-file-pdf-o"></i></a> ';
        }
        if (podeBaixa && b.status !== 'PAGO' && b.status !== 'CANCELADO') {
          acoes += '<button class="btn btn-xs btn-success btn-baixa" data-bid="' + b.id + '" title="Confirmar pagamento"><i class="fa fa-check"></i></button> ';
        }
        if (podeEditarVenc && b.status !== 'PAGO' && b.status !== 'CANCELADO') {
          acoes += '<button class="btn btn-xs btn-warning btn-editar-data" data-bid="' + b.id + '" data-venc="' + (b.vencimento || '').split('T')[0] + '" title="Alterar vencimento"><i class="fa fa-calendar"></i></button> ';
        }
        if (cliente && cliente.telefone) {
          var phone = cliente.telefone.replace(/\D/g, '');
          if (phone.length === 10 || phone.length === 11) phone = '55' + phone;
          if (phone) {
            var msg = 'Olá ' + (cliente.nome || '') + '! Segue o link do seu boleto de rastreamento';
            if (b.vencimento) msg += ' com vencimento em ' + AL.fmtDate(b.vencimento);
            if (b.linkBoleto) msg += ': ' + b.linkBoleto;
            acoes += '<a href="https://wa.me/' + phone + '?text=' + encodeURIComponent(msg) + '" target="_blank" class="btn btn-xs" style="background:#25d366;color:#fff;border-color:#1ebe5d;" title="Enviar WhatsApp"><i class="fa fa-whatsapp"></i></a>';
          }
        }

        return '<tr>' +
          '<td>' + clienteCell + '</td>' +
          '<td>' + parcelaCell + '</td>' +
          '<td>' + placasCell + '</td>' +
          '<td>' + (AL.fmtDate(b.vencimento) || '—') + '</td>' +
          '<td>' + (b.dataPagamento ? AL.fmtDate(b.dataPagamento) : '—') + '</td>' +
          '<td>' + AL.fmtMoney(b.valor) + '</td>' +
          '<td>' + statusCell + '</td>' +
          '<td><div class="boleto-actions">' + acoes + '</div></td>' +
          '</tr>';
      }).join('');

      tbody.querySelectorAll('.btn-baixa').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var bid = this.dataset.bid;
          var self = this;
          AL.confirmar({
            titulo: 'Confirmar Baixa',
            mensagem: 'Confirmar pagamento manual deste boleto?',
            consequencias: 'O boleto será marcado como pago e a comissão do vendedor será calculada automaticamente.',
            btnTexto: '<i class="fa fa-check"></i> Confirmar Baixa',
            btnClasse: 'btn-success',
          }).then(function (ok) {
            if (!ok) return;
            self.disabled = true;
            self.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
            AL.apiPatch('/api/boletos/' + bid + '/baixa', {})
              .then(function () { AL.showAlert('Baixa registrada.', 'success'); carregarBoletos(); })
              .catch(function (err) { self.disabled = false; self.innerHTML = '<i class="fa fa-check"></i>'; AL.showAlert(err.message); });
          });
        });
      });

      tbody.querySelectorAll('.btn-editar-data').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.getElementById('edit-boleto-id').value = this.dataset.bid;
          document.getElementById('edit-data').value = this.dataset.venc;
          document.getElementById('modal-edit-alert').innerHTML = '';
          $('#modal-editar-boleto').modal('show');
        });
      });
    }

    document.getElementById('btn-salvar-edit').addEventListener('click', function () {
      var bid = document.getElementById('edit-boleto-id').value;
      var dt = document.getElementById('edit-data').value;
      if (!dt) {
        document.getElementById('modal-edit-alert').innerHTML = '<div class="alert alert-danger">Informe a data.</div>';
        return;
      }
      var btn = this;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Salvando…';
      AL.apiPatch('/api/boletos/' + bid + '/editar', { dataVencimento: dt })
        .then(function () {
          $('#modal-editar-boleto').modal('hide');
          AL.showAlert('Vencimento atualizado.', 'success');
          carregarBoletos();
        })
        .catch(function (err) {
          document.getElementById('modal-edit-alert').innerHTML = '<div class="alert alert-danger">' + esc(err.message) + '</div>';
        })
        .finally(function () {
          btn.disabled = false;
          btn.innerHTML = 'Salvar';
        });
    });

    document.getElementById('filtro-busca').addEventListener('input', function () {
      filtros.busca = this.value.trim();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(carregarBoletos, 400);
    });
    document.getElementById('filtro-status').addEventListener('change', function () { filtros.status = this.value; carregarBoletos(); });
    document.getElementById('filtro-tipo').addEventListener('change', function () { filtros.tipo = this.value; carregarBoletos(); });
    document.getElementById('filtro-data-de').addEventListener('change', function () { filtros.dataDe = this.value; carregarBoletos(); });
    document.getElementById('filtro-data-ate').addEventListener('change', function () { filtros.dataAte = this.value; carregarBoletos(); });
    document.getElementById('btn-limpar').addEventListener('click', function () {
      filtros = { busca: '', status: '', tipo: '', dataDe: '', dataAte: '' };
      document.getElementById('filtro-busca').value = '';
      document.getElementById('filtro-status').value = '';
      document.getElementById('filtro-tipo').value = '';
      document.getElementById('filtro-data-de').value = '';
      document.getElementById('filtro-data-ate').value = '';
      carregarBoletos();
    });

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    carregarBoletos();
  })();
  </script>
</body>
</html>
